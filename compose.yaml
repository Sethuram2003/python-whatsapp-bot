services:
  fastapi:
    build:
      context: .
      dockerfile: docker/fastapi/Dockerfile
    ports:
      - "8000:8000"
    env_file:
      - .env
    depends_on:
      - simplemcp
    networks:
      - app-network

  simplemcp:
    build:
      context: McpServers/SimpleMcp
      dockerfile: Dockerfile          
    ports:
      - "8001:8001"
    env_file:
      - McpServers/SimpleMcp/.env
    networks:
      - app-network

networks:
  app-network:
    driver: bridge